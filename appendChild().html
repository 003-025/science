<body>
  <input type="text" id="itemInput" placeholder="Write something...">
  <button onclick="addItem()">Add to List</button><button onclick="delet()">clear list</button>
  <br/>
  <h1>add to do list or set Question to answer</h1>

  <ul id="myList"></ul>

  <script>
    function addItem() {
      // 1. Get the input value
      let text = document.getElementById("itemInput").value;

      // 2. Create a new <li> element
      let newItem = document.createElement("li");

      // 3. Add text inside the <li>
      newItem.textContent = text;

      // 4. Append <li> to the <ul>
      document.getElementById("myList").appendChild(newItem);

      // 5. Clear the input
      document.getElementById("itemInput").value = "";
    }
    function delet(){
        document.getElementById("myList").innerHTML = "";
    }
  </script>
  </body>
</html>
